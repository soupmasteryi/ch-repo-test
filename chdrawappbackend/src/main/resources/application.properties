server.port=8080

spring.application.name=chdrawappbackend

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/drawapp
spring.datasource.username=postgres
spring.datasource.password=badpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Multipart uploads
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Application-specific configuration
# Base64-encoded HMAC secret. Override via APP_JWT_SECRET in production.
app.jwt.secret=${APP_JWT_SECRET:Y2hkcmF3YXBwLXN1cGVyLXNlY3JldC1rZXktY2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tMTIzNDU2}
# Access token lifetime in milliseconds (24h)
app.jwt.expiration-ms=8640000000

logging.level.org.example.drawapp=INFO
